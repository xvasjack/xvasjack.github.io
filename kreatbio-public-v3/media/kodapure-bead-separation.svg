<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">KodaPure magnetic bead separation illustration</title>
  <desc id="desc">Illustrated close-up showing magnetic beads pulled to the side of a tube during the separation step.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbfd"/>
      <stop offset="100%" stop-color="#edf4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#10243a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <g transform="translate(120 120)" filter="url(#shadow)">
    <rect width="960" height="660" rx="36" fill="#ffffff" stroke="#d8e1ea" stroke-width="4"/>
  </g>
  <g transform="translate(250 205)">
    <rect x="0" y="0" width="520" height="430" rx="42" fill="#f8fbfd" stroke="#d8e1ea" stroke-width="4"/>
    <path d="M194 68h132v72l72 112c32 49 10 117-49 149-15 8-31 12-48 12H218c-72 0-116-77-79-139l55-96V68z" fill="#eef4f8" stroke="#9cb0c4" stroke-width="5"/>
    <path d="M250 230h140c41 0 74 33 74 74v56c0 17-14 31-31 31H207c-17 0-31-14-31-31v-56c0-41 33-74 74-74z" fill="#d8eef4"/>
    <rect x="488" y="192" width="60" height="240" rx="18" fill="#d94f4f"/>
    <rect x="176" y="56" width="168" height="28" rx="14" fill="#163f68"/>
    <text x="260" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Magnetic separation step</text>
    <g fill="#127da1">
      <circle cx="440" cy="274" r="10"/>
      <circle cx="426" cy="302" r="10"/>
      <circle cx="446" cy="328" r="10"/>
      <circle cx="430" cy="356" r="10"/>
      <circle cx="414" cy="382" r="10"/>
      <circle cx="394" cy="334" r="10"/>
      <circle cx="386" cy="286" r="10"/>
    </g>
    <path d="M212 266c58 28 89 36 126 34M220 324c54 18 92 22 130 18M230 378c44 8 75 10 118 6" stroke="#0e3153" stroke-width="4" stroke-linecap="round" opacity="0.22"/>
  </g>
  <g transform="translate(800 230)">
    <rect x="0" y="0" width="194" height="154" rx="26" fill="#ffffff" stroke="#d8e1ea" stroke-width="4"/>
    <text x="30" y="48" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#103c66">What this proves</text>
    <text x="30" y="82" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">Show the magnet pull, the bead wall,</text>
    <text x="30" y="108" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">and the cleared supernatant in the final</text>
    <text x="30" y="134" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">production image set.</text>
    <rect x="0" y="186" width="194" height="210" rx="26" fill="#ffffff" stroke="#d8e1ea" stroke-width="4"/>
    <text x="30" y="232" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#103c66">Current status</text>
    <text x="30" y="266" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">Illustrated product proof slot used</text>
    <text x="30" y="292" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">until final branded photography is</text>
    <text x="30" y="318" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">published.</text>
  </g>
</svg>
