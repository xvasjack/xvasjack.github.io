<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">KodaGeno lesson choice illustration</title>
  <desc id="desc">Illustrated lesson card showing a scenario prompt, answer choices, feedback, and next-step explanation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#edf4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#10243a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <g transform="translate(120 120)" filter="url(#shadow)">
    <rect width="960" height="660" rx="36" fill="#ffffff" stroke="#cadeff" stroke-width="4"/>
  </g>
  <g transform="translate(180 180)">
    <rect x="0" y="0" width="250" height="540" rx="30" fill="#0f2642"/>
    <text x="38" y="52" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Lesson track</text>
    <rect x="28" y="90" width="194" height="68" rx="18" fill="rgba(255,255,255,0.1)"/>
    <rect x="28" y="176" width="194" height="68" rx="18" fill="rgba(255,255,255,0.05)"/>
    <rect x="28" y="262" width="194" height="68" rx="18" fill="rgba(255,255,255,0.05)"/>
    <text x="48" y="124" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Module 1</text>
    <text x="48" y="148" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9db0c5">FastQC and trimming</text>
    <text x="48" y="210" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Module 2</text>
    <text x="48" y="234" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9db0c5">Assembly and QA</text>
    <text x="48" y="296" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Module 3</text>
    <text x="48" y="320" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9db0c5">Interpret outputs</text>
  </g>
  <g transform="translate(470 180)">
    <rect x="0" y="0" width="550" height="540" rx="30" fill="#ffffff" stroke="#d9e5ff" stroke-width="4"/>
    <text x="34" y="52" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">Scenario</text>
    <text x="34" y="92" font-family="Inter, Arial, sans-serif" font-size="20" fill="#103c66">FastQC shows a quality drop after position 140.</text>
    <text x="34" y="122" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">What should the learner do before assembly?</text>
    <g transform="translate(34 160)">
      <rect width="482" height="68" rx="18" fill="#f8fbff" stroke="#d9e5ff" stroke-width="3"/>
      <circle cx="28" cy="34" r="10" fill="#ffffff" stroke="#9db6df" stroke-width="3"/>
      <text x="54" y="40" font-family="Inter, Arial, sans-serif" font-size="18" fill="#103c66">Proceed directly to assembly</text>
    </g>
    <g transform="translate(34 244)">
      <rect width="482" height="68" rx="18" fill="#eef4ff" stroke="#1d4ed8" stroke-width="3"/>
      <circle cx="28" cy="34" r="10" fill="#1d4ed8"/>
      <text x="54" y="40" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#103c66">Trim with a conservative quality profile</text>
    </g>
    <g transform="translate(34 328)">
      <rect width="482" height="68" rx="18" fill="#f8fbff" stroke="#d9e5ff" stroke-width="3"/>
      <circle cx="28" cy="34" r="10" fill="#ffffff" stroke="#9db6df" stroke-width="3"/>
      <text x="54" y="40" font-family="Inter, Arial, sans-serif" font-size="18" fill="#103c66">Trim aggressively and risk depth loss</text>
    </g>
    <g transform="translate(34 412)">
      <rect width="482" height="94" rx="22" fill="#f5faff" stroke="#d9e5ff" stroke-width="3"/>
      <text x="24" y="34" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">Why this answer works</text>
      <text x="24" y="64" font-family="Inter, Arial, sans-serif" font-size="17" fill="#556476">The learner keeps enough read length for assembly while cleaning the low-quality tail.</text>
    </g>
  </g>
</svg>
