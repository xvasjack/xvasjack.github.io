<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">KodaPure pack shot illustration</title>
  <desc id="desc">Illustrated product view showing the KodaPure kit box, reagent bottle, magnetic beads, and preparation tubes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbfd"/>
      <stop offset="100%" stop-color="#edf3f8"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#173f69"/>
      <stop offset="100%" stop-color="#0e3153"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f6fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#10243a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M80 120h280M80 168h210M80 216h240" stroke="#127da1" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="150" width="980" height="600" rx="40" fill="#ffffff"/>
    <rect x="110" y="150" width="980" height="600" rx="40" fill="none" stroke="#d8e1ea" stroke-width="4"/>
  </g>
  <g transform="translate(180 220)">
    <rect x="0" y="0" width="410" height="420" rx="28" fill="url(#box)"/>
    <rect x="34" y="36" width="342" height="348" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
    <text x="54" y="118" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">KodaPure</text>
    <text x="54" y="168" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">DNA Extraction</text>
    <text x="54" y="220" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">Kit</text>
    <text x="54" y="284" font-family="Inter, Arial, sans-serif" font-size="23" fill="#cfe3f1">Magnetic-bead preparation for research</text>
    <text x="54" y="318" font-family="Inter, Arial, sans-serif" font-size="23" fill="#cfe3f1">sample handling and downstream QC review.</text>
    <rect x="54" y="354" width="124" height="34" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="79" y="378" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">RUO</text>
  </g>
  <g transform="translate(640 230)">
    <rect x="0" y="70" width="118" height="252" rx="26" fill="url(#panel)" stroke="#cbd7e4" stroke-width="4"/>
    <rect x="16" y="104" width="86" height="128" rx="16" fill="#163f68"/>
    <rect x="16" y="246" width="86" height="48" rx="14" fill="#dff0f5"/>
    <text x="59" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Binding beads</text>
    <circle cx="30" cy="258" r="5" fill="#127da1"/>
    <circle cx="45" cy="271" r="5" fill="#127da1"/>
    <circle cx="60" cy="258" r="5" fill="#127da1"/>
    <circle cx="75" cy="271" r="5" fill="#127da1"/>
    <circle cx="90" cy="258" r="5" fill="#127da1"/>
    <rect x="144" y="102" width="108" height="210" rx="24" fill="url(#panel)" stroke="#cbd7e4" stroke-width="4"/>
    <rect x="164" y="132" width="68" height="106" rx="18" fill="#ffffff" stroke="#d8e1ea"/>
    <rect x="176" y="146" width="44" height="62" rx="12" fill="#edf3f8"/>
    <rect x="158" y="82" width="80" height="34" rx="14" fill="#173f69"/>
    <text x="198" y="103" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Wash buffer</text>
    <rect x="278" y="146" width="88" height="164" rx="22" fill="url(#panel)" stroke="#cbd7e4" stroke-width="4"/>
    <rect x="292" y="122" width="60" height="36" rx="14" fill="#127da1"/>
    <text x="322" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Elution</text>
    <rect x="312" y="188" width="20" height="82" rx="10" fill="#d8eef4"/>
    <rect x="390" y="178" width="138" height="132" rx="22" fill="#ffffff" stroke="#cbd7e4" stroke-width="4"/>
    <rect x="412" y="202" width="94" height="22" rx="11" fill="#173f69" fill-opacity="0.1"/>
    <rect x="412" y="238" width="80" height="16" rx="8" fill="#d8e1ea"/>
    <rect x="412" y="266" width="64" height="16" rx="8" fill="#d8e1ea"/>
    <text x="459" y="296" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#103c66">Quick protocol</text>
  </g>
  <g transform="translate(188 90)">
    <rect x="0" y="0" width="158" height="38" rx="19" fill="#ffffff" stroke="#d8e1ea"/>
    <text x="79" y="25" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#103c66">Illustrated product view</text>
  </g>
</svg>
