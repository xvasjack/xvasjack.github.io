<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">KodaGeno cohort dashboard illustration</title>
  <desc id="desc">Illustrated dashboard view showing cohort progress, module completion, and instructor reporting for KodaGeno.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eaf2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#10243a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <g transform="translate(90 120)" filter="url(#shadow)">
    <rect width="1020" height="660" rx="36" fill="#ffffff" stroke="#cadeff" stroke-width="4"/>
    <rect width="252" height="660" rx="36" fill="#0f2642"/>
    <rect x="40" y="40" width="172" height="48" rx="16" fill="rgba(255,255,255,0.08)"/>
    <text x="126" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Cohort dashboard</text>
    <rect x="32" y="128" width="188" height="72" rx="18" fill="rgba(255,255,255,0.08)"/>
    <rect x="32" y="218" width="188" height="72" rx="18" fill="rgba(255,255,255,0.05)"/>
    <rect x="32" y="308" width="188" height="72" rx="18" fill="rgba(255,255,255,0.05)"/>
    <text x="54" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2026 Bacterial WGS Cohort</text>
    <text x="54" y="192" font-family="Inter, Arial, sans-serif" font-size="15" fill="#9db0c5">32 learners | 14 weeks</text>
    <text x="54" y="256" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Bootcamp delivery</text>
    <text x="54" y="282" font-family="Inter, Arial, sans-serif" font-size="15" fill="#9db0c5">18 learners | 7 days</text>
    <text x="54" y="346" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Instructor notes</text>
    <text x="54" y="372" font-family="Inter, Arial, sans-serif" font-size="15" fill="#9db0c5">Launch, follow-up, renewal</text>
  </g>
  <g transform="translate(390 176)">
    <rect x="0" y="0" width="660" height="118" rx="24" fill="#f8fbff" stroke="#d9e5ff" stroke-width="4"/>
    <text x="34" y="44" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">Instructor summary</text>
    <rect x="34" y="64" width="150" height="20" rx="10" fill="#dbe7ff"/>
    <rect x="476" y="30" width="150" height="58" rx="18" fill="#1d4ed8"/>
    <text x="551" y="66" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Export report</text>
    <g transform="translate(0 146)">
      <rect width="312" height="240" rx="26" fill="#ffffff" stroke="#d9e5ff" stroke-width="4"/>
      <text x="28" y="40" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#103c66">Module completion</text>
      <rect x="28" y="72" width="256" height="18" rx="9" fill="#e9f0fa"/>
      <rect x="28" y="72" width="194" height="18" rx="9" fill="#1d4ed8"/>
      <rect x="28" y="120" width="256" height="18" rx="9" fill="#e9f0fa"/>
      <rect x="28" y="120" width="166" height="18" rx="9" fill="#4f86ff"/>
      <rect x="28" y="168" width="256" height="18" rx="9" fill="#e9f0fa"/>
      <rect x="28" y="168" width="122" height="18" rx="9" fill="#7aa6ff"/>
      <text x="28" y="108" font-family="Inter, Arial, sans-serif" font-size="15" fill="#556476">QC and trimming</text>
      <text x="28" y="156" font-family="Inter, Arial, sans-serif" font-size="15" fill="#556476">Assembly and QA</text>
      <text x="28" y="204" font-family="Inter, Arial, sans-serif" font-size="15" fill="#556476">Interpretation and reporting</text>
    </g>
    <g transform="translate(348 146)">
      <rect width="312" height="240" rx="26" fill="#ffffff" stroke="#d9e5ff" stroke-width="4"/>
      <text x="28" y="40" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#103c66">Launch checklist</text>
      <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#556476">
        <circle cx="38" cy="92" r="10" fill="#dbe7ff"/><text x="62" y="98">Seat list approved</text>
        <circle cx="38" cy="132" r="10" fill="#dbe7ff"/><text x="62" y="138">Instructor access live</text>
        <circle cx="38" cy="172" r="10" fill="#dbe7ff"/><text x="62" y="178">Learner emails sent</text>
        <circle cx="38" cy="212" r="10" fill="#dbe7ff"/><text x="62" y="218">First report scheduled</text>
      </g>
    </g>
    <g transform="translate(0 414)">
      <rect width="660" height="190" rx="26" fill="#ffffff" stroke="#d9e5ff" stroke-width="4"/>
      <text x="28" y="40" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#103c66">Example reporting cycle</text>
      <text x="28" y="78" font-family="Inter, Arial, sans-serif" font-size="16" fill="#556476">Week 1: cohort launched | Week 3: first completion report | Week 7: instructor review | Week 14: term summary</text>
      <rect x="28" y="112" width="140" height="42" rx="16" fill="#eef4ff" stroke="#d9e5ff"/>
      <rect x="188" y="112" width="140" height="42" rx="16" fill="#eef4ff" stroke="#d9e5ff"/>
      <rect x="348" y="112" width="140" height="42" rx="16" fill="#eef4ff" stroke="#d9e5ff"/>
      <rect x="508" y="112" width="124" height="42" rx="16" fill="#eef4ff" stroke="#d9e5ff"/>
      <text x="98" y="139" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Launch</text>
      <text x="258" y="139" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Progress review</text>
      <text x="418" y="139" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Instructor follow-up</text>
      <text x="570" y="139" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">Renewal</text>
    </g>
  </g>
</svg>
