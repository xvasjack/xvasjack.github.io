<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">KodaPure reagent layout illustration</title>
  <desc id="desc">Illustrated flat layout showing reagent bottles, microtubes, magnetic beads, and quick protocol card for KodaPure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbfdfe"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#10243a" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <g transform="translate(120 120)" filter="url(#shadow)">
    <rect width="960" height="660" rx="34" fill="#ffffff" stroke="#d8e1ea" stroke-width="4"/>
  </g>
  <g transform="translate(170 170)">
    <rect x="0" y="0" width="210" height="520" rx="28" fill="#ffffff" stroke="#cbd7e4" stroke-width="4"/>
    <rect x="34" y="34" width="142" height="168" rx="18" fill="#173f69"/>
    <text x="105" y="108" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">KodaPure</text>
    <text x="105" y="156" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#d8eef4">DNA extraction kit</text>
    <rect x="34" y="238" width="142" height="52" rx="16" fill="#eef3f7"/>
    <rect x="34" y="308" width="142" height="52" rx="16" fill="#eef3f7"/>
    <rect x="34" y="378" width="142" height="52" rx="16" fill="#eef3f7"/>
    <text x="105" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#103c66">Lysis and binding</text>
    <text x="105" y="340" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#103c66">Wash and clear</text>
    <text x="105" y="410" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#103c66">Elute for QC</text>
    <text x="105" y="475" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#7a8794">Packaging proof slot</text>
  </g>
  <g transform="translate(430 180)">
    <g>
      <rect x="0" y="42" width="126" height="252" rx="24" fill="#ffffff" stroke="#cbd7e4" stroke-width="4"/>
      <rect x="20" y="0" width="86" height="58" rx="16" fill="#173f69"/>
      <text x="63" y="37" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Lysis</text>
      <rect x="24" y="90" width="78" height="128" rx="18" fill="#eef3f7"/>
    </g>
    <g transform="translate(166 0)">
      <rect x="0" y="42" width="126" height="252" rx="24" fill="#ffffff" stroke="#cbd7e4" stroke-width="4"/>
      <rect x="20" y="0" width="86" height="58" rx="16" fill="#127da1"/>
      <text x="63" y="37" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Beads</text>
      <circle cx="32" cy="170" r="8" fill="#127da1"/>
      <circle cx="53" cy="190" r="8" fill="#127da1"/>
      <circle cx="74" cy="165" r="8" fill="#127da1"/>
      <circle cx="94" cy="190" r="8" fill="#127da1"/>
      <circle cx="64" cy="210" r="8" fill="#127da1"/>
    </g>
    <g transform="translate(332 0)">
      <rect x="0" y="42" width="126" height="252" rx="24" fill="#ffffff" stroke="#cbd7e4" stroke-width="4"/>
      <rect x="20" y="0" width="86" height="58" rx="16" fill="#173f69"/>
      <text x="63" y="37" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Wash</text>
      <rect x="24" y="120" width="78" height="86" rx="18" fill="#d8eef4"/>
    </g>
    <g transform="translate(498 0)">
      <rect x="0" y="42" width="126" height="252" rx="24" fill="#ffffff" stroke="#cbd7e4" stroke-width="4"/>
      <rect x="20" y="0" width="86" height="58" rx="16" fill="#127da1"/>
      <text x="63" y="37" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Elution</text>
      <rect x="50" y="104" width="26" height="120" rx="13" fill="#eef3f7"/>
    </g>
  </g>
  <g transform="translate(450 520)">
    <rect x="0" y="0" width="520" height="122" rx="26" fill="#f8fbfd" stroke="#d8e1ea" stroke-width="4"/>
    <rect x="30" y="24" width="94" height="74" rx="16" fill="#ffffff" stroke="#d8e1ea"/>
    <rect x="44" y="38" width="66" height="10" rx="5" fill="#d8e1ea"/>
    <rect x="44" y="56" width="54" height="10" rx="5" fill="#d8e1ea"/>
    <rect x="44" y="74" width="42" height="10" rx="5" fill="#d8e1ea"/>
    <text x="156" y="48" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#103c66">Reagent and consumable layout</text>
    <text x="156" y="82" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">Use this slot for final tube, buffer, and consumable photography when branded</text>
    <text x="156" y="108" font-family="Inter, Arial, sans-serif" font-size="18" fill="#556476">production images are ready.</text>
  </g>
</svg>
